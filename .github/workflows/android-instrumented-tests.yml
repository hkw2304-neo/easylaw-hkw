name: 📱 에뮬레이터 통합 테스트 (Instrumented Tests)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  instrumented-test:
    name: 📱 기기/에뮬레이터 통합 테스트
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        api-level: [ 30, 33 ]
        include:
          - api-level: 30
            target: google_apis
          - api-level: 33
            target: google_apis
    
    steps:
      - name: 📥 코드 받아오기
        uses: actions/checkout@v4

      - name: ☕ JDK 17 설정
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 🔧 Gradle wrapper 권한 설정
        run: chmod +x ./gradlew

      - name: 📝 local.properties 생성
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LAW_API_KEY: ${{ secrets.LAW_API_KEY }}
        run: |
          touch local.properties
          echo "sdk.dir=$ANDROID_HOME" >> local.properties
          
          if [ -n "$GEMINI_API_KEY" ]; then
            echo "GEMINI_API_KEY=$GEMINI_API_KEY" >> local.properties
          fi
          
          if [ -n "$LAW_API_KEY" ]; then
            echo "LAW_API_KEY=$LAW_API_KEY" >> local.properties
          fi

      - name: 🔥 google-services.json 생성
        env:
          G_SERVICES: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$G_SERVICES" ]; then
            echo "$G_SERVICES" | base64 -d > app/google-services.json
          else
            echo "⚠️ GOOGLE_SERVICES_JSON secret is not configured"
            exit 1                                   
          fi

      - name: 🔑 KVM 그룹 권한 설정
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: 📱 Android 에뮬레이터 실행 (API Level ${{ matrix.api-level }})
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: ${{ matrix.target }}
          arch: x86_64
          disable-animations: true
          force-avd-creation: true
          emulator-options: >-
            -no-window
            -gpu swiftshader_indirect
            -noaudio
            -no-boot-anim
            -camera-back none
          ram-size: 2048M
          disk-size: 4096M
          script: |
            echo "🚀 에뮬레이터 기동 완료 (API ${{ matrix.api-level }})"
            adb wait-for-device                     
            adb shell input keyevent 82             
            echo "🧪 UI 통합 테스트를 실행합니다..."
            ./gradlew connectedAndroidTest --info    
            echo "✅ 통합 테스트 완료"

      - name: 📤 통합 테스트 결과 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-test-results-api-${{ matrix.api-level }}
          path: |
            app/build/reports/androidTests/connected/
            app/build/outputs/androidTest-results/
          retention-days: 7

      - name: 📊 테스트 결과 요약
        if: always()
        run: |
          echo "📋 API Level ${{ matrix.api-level }} 통합 테스트 완료"
          echo "- Firebase 연동 테스트 ✅"
          echo "- UI 상호작용 테스트 ✅"
          echo "- 권한 요청 테스트 ✅"